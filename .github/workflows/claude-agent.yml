name: Claude Agent Review & Fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-fix:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          path: '.'

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GH_PAT }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          allowed_tools: "Bash,Edit,MultiEdit,Write,Read,Glob,Grep"
          # 指示内容：コメントを読み、修正してプッシュまで実行させる
          prompt: |
            あなたはPRレビューコメントに基づいてコードを修正するエージェントです。
            ファイル読み取り・編集・git操作はすべて事前に許可済みです。
            ユーザーへの確認は一切不要です。各ステップを自律的に完了してください。

            ## タスクの手順

            1. **コンテキストの把握**
               - トリガーとなったコメントの内容を正確に読み取る
               - `git diff origin/main...HEAD` で変更箇所を把握する
               - コメントが指摘している問題を明確に理解する

            2. **対応方針の判断**
               - コード修正が必要な指摘 → 即座に修正を実施する
               - 質問・説明のみのコメント → コードは変更せず、回答をPRコメントとして投稿する
               - 曖昧な指摘 → 最も合理的な解釈で対応し、その解釈をコメントで明示する

            3. **修正の実施（コード変更が必要な場合）**
               - 指摘箇所のみを最小限に修正する（関係のないリファクタリングは行わない）
               - 既存のコーディング規約・スタイルに従う

            4. **コミットとプッシュ**
               - `git add <ファイル>` → `git commit` → `git push` を順に実行する
               - コミットメッセージ形式: `fix: <修正内容の簡潔な説明>（by Claude）`
               - ユーザーの承認を待たずに直ちに実行すること

            5. **PRへの報告コメント**
               以下の形式でコメントを投稿する:
               ```
               ## Claude による修正報告

               ### 対応したコメント
               <コメントの要約>

               ### 実施した変更
               <変更したファイルと変更内容の箇条書き>

               ### 変更しなかった理由（変更なしの場合）
               <理由>
               ```

            ## 注意事項
            - セキュリティ上のリスクがある変更は行わない
            - 破壊的変更（APIの互換性を壊す変更等）は実施前にコメントで確認を求める
            - 複数の問題が混在する場合は、それぞれを個別に対処する