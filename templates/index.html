<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Notes</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background: #f6f3ee;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(209, 186, 161, 0.35), transparent 30%),
          linear-gradient(180deg, #faf8f4 0%, #f0ebe2 100%);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 32px auto 48px;
      }

      .hero {
        margin-bottom: 24px;
      }

      h1 {
        margin-bottom: 8px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .subtitle {
        margin: 0;
        color: #52606d;
      }

      .panel {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(82, 96, 109, 0.15);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
        backdrop-filter: blur(10px);
      }

      .panel + .panel {
        margin-top: 20px;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd2d9;
        border-radius: 10px;
        background: white;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 14px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
      }

      .primary {
        background: #b45f06;
        color: #fffaf2;
      }

      .secondary {
        background: #e9eef2;
        color: #243b53;
      }

      .danger {
        background: #fce8e6;
        color: #9b1c1c;
      }

      .error {
        margin: 0 0 12px;
        color: #b42318;
        font-weight: 600;
      }

      .papers {
        display: grid;
        gap: 14px;
      }

      .paper-card {
        border: 1px solid rgba(31, 41, 51, 0.12);
        border-radius: 16px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.96);
      }

      .paper-header {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        justify-content: space-between;
      }

      .paper-title {
        margin: 0 0 6px;
        font-size: 1.15rem;
      }

      .meta {
        margin: 0;
        color: #52606d;
        font-size: 0.95rem;
      }

      .meta + .meta {
        margin-top: 4px;
      }

      .paper-form {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      .paper-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .saved-note {
        margin: 0;
        color: #0f766e;
        font-size: 0.9rem;
      }

      .empty {
        margin: 0;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    {% include "partials/page_content.html" %}
  </body>
</html>
