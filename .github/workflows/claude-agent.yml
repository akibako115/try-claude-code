name: Claude Agent Review & Fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-fix:
    # ユーザーがコメントで @claude と呼んだ時だけ起動
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # ポイント1: prompt は空にする（自動検出に任せる）
          # Actionは "@claude 〇〇を直して" というコメント自体を自動でプロンプトとして読み取ります。
          
          # ポイント2: エージェントの「基本ルール」はシステムプロンプトとして注入する
          claude_args: |
            --append-system-prompt "あなたはPRコメントに基づいて修正を行う優秀なエージェントです。以下のルールに絶対に従ってください。
            1. 確認不要・自律実行: ユーザーへの許可（y/n）を求めず、自律的に完了まで作業してください。
            2. 修正とプッシュ: コード修正が必要な場合は指摘箇所を直し、組み込みツールを使って commit & push してください。
            3. コメント投稿: 修正後、または質問・説明の回答は、組み込みのGitHubツールを使用してPRにコメントとして投稿してください。
            4. 完了報告フォーマット: 修正後の報告コメントは必ず『## Claude による修正報告 / 対応内容: <要約> / 変更ファイル: <一覧>』の形式を使用してください。
            5. 破壊的変更: API互換性を壊すなどの重大な変更の場合は、実施前にコメントで確認を求めてください。"