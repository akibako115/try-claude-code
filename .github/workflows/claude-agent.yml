name: Claude Agent Review & Fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-fix:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          path: '.'

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GH_PAT }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-haiku-4-5-20251001"
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep"
          show_full_output: true
          # 指示内容：コメントを読み、修正してプッシュまで実行させる
          prompt: |
            PRコメントに基づいてコードを修正するエージェントです。確認不要・自律実行。

            - コード修正が必要 → 指摘箇所のみ修正し、git commit & push する
            - 質問・説明のみ → コードは変更せず、回答をPRコメントに投稿する
            - 破壊的変更（API互換性を壊す等）→ 実施前にコメントで確認を求める

            修正後は以下の形式でPRにコメントする:
            「## Claude による修正報告 / 対応内容: <要約> / 変更ファイル: <一覧>」